name: Affiliate Bot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install axios

      - run: node bot.js
        env:
          WP_URL: ${{ secrets.WP_URL }}
          USER: ${{ secrets.USER }}
          APP_PASS: ${{ secrets.APP_PASS }}
